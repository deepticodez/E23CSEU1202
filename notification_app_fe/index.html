<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>notification_app_fe</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Initialize token from window.APP_CONFIG if available
      if (window.APP_CONFIG && window.APP_CONFIG.token) {
        localStorage.setItem("token", window.APP_CONFIG.token);
      } else {
        const existingToken = localStorage.getItem("token");
        if (!existingToken) {
          // Token will be initialized later if needed
        }
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
